<!DOCTYPE html>
<html>
<head>
  <title>Document Portal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 400px;
    }

    .check {
      font-size: 40px;
      color: green;
    }

    h1 {
      margin: 15px 0;
    }

    p {
      color: gray;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    a:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

  <div class="box">

    <div class="check">✓</div>

    <h1>Your Document is Ready</h1>

    <p>Click below to download your file</p>

    <a href="https://drive.google.com/uc?export=download&id=1_nFZTZjPbyl92vsd2n_q2GGGt04vbHuC">
      Download PDF
    </a>

  </div>

</body>
</html>
